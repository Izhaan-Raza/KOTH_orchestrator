[global]
   workgroup = WORKGROUP
   server string = KoTH SMB Server
   netbios name = KOTH
   security = user
   map to guest = bad user
   dns proxy = no
   log file = /var/log/samba/log.%m
   max log size = 1000

[share]
   path = /srv/smb/share
   browsable = yes
   writable = yes
   guest ok = yes
   guest only = yes
   read only = no
   create mask = 0777
   directory mask = 0777
   comment = Public share - contains backup files
