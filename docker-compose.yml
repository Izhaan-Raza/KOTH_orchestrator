# =============================================================================
# LOCAL DEVELOPMENT ONLY — NOT the production control plane.
# The production runtime is referee-server/ with per-node compose files under
# REMOTE_SERIES_ROOT/h{1..8}/ on each challenge node.
# See docs/operations/full-deployment-runbook.md for the real deployment model.
# =============================================================================
services:
  # ============================================================
  # HOUR 1
  # ============================================================
  machineH1A:
    build: ./examples/Series H1/machineH1A
    container_name: machineH1A
    image: machineh1a
    ports:
      - "10001:80"
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN

  machineH1B:
    build: ./examples/Series H1/machineH1B
    container_name: machineH1B
    image: machineh1b
    ports:
      - "10002:6379"
      - "10003:22"
    restart: unless-stopped

  machineH1C:
    build: ./examples/Series H1/machineH1C
    container_name: machineH1C
    image: machineh1c
    ports:
      - "10004:80"
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN

  # ============================================================
  # HOUR 2
  # ============================================================
  machineH2A:
    build: ./examples/Series H2/machineH2A
    container_name: machineH2A
    image: machineh2a
    ports:
      - "10010:8080"
    restart: unless-stopped

  machineH2B:
    build: ./examples/Series H2/machineH2B
    container_name: machineH2B
    image: machineh2b
    ports:
      - "10011:80"
    restart: unless-stopped

  machineH2C:
    build: ./examples/Series H2/machineH2C
    container_name: machineH2C
    image: machineh2c
    ports:
      - "10012:8080"
    restart: unless-stopped

  # ============================================================
  # HOUR 3
  # ============================================================
  machineH3A:
    build: ./examples/Series H3/machineH3A
    container_name: machineH3A
    image: machineh3a
    ports:
      - "10020:445"
      - "10021:22"
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN

  machineH3B:
    build: ./examples/Series H3/machineH3B
    container_name: machineH3B
    image: machineh3b
    ports:
      - "10022:80"
    restart: unless-stopped

  machineH3C:
    build: ./examples/Series H3/machineH3C
    container_name: machineH3C
    image: machineh3c
    ports:
      - "10023:80"
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN

  # ============================================================
  # HOUR 4
  # ============================================================
  machineH4A:
    build: ./examples/Series H4/machineH4A
    container_name: machineH4A
    image: machineh4a
    ports:
      - "10030:3000"
    restart: unless-stopped

  machineH4B:
    build: ./examples/Series H4/machineH4B
    container_name: machineH4B
    image: machineh4b
    ports:
      - "10031:8080"
    restart: unless-stopped

  machineH4C:
    build: ./examples/Series H4/machineH4C
    container_name: machineH4C
    image: machineh4c
    ports:
      - "10032:80"
    restart: unless-stopped

  # ============================================================
  # HOUR 5
  # ============================================================
  machineH5A:
    build: ./examples/Series H5/machineH5A
    container_name: machineH5A
    image: machineh5a
    ports:
      - "10040:10000"
    restart: unless-stopped

  machineH5B:
    build: ./examples/Series H5/machineH5B
    container_name: machineH5B
    image: machineh5b
    ports:
      - "10041:9200"
    restart: unless-stopped

  machineH5C:
    build: ./examples/Series H5/machineH5C
    container_name: machineH5C
    image: machineh5c
    ports:
      - "10042:8080"
    restart: unless-stopped

  # ============================================================
  # HOUR 6
  # ============================================================
  machineH6A:
    build: ./examples/Series H6/machineH6A
    container_name: machineH6A
    image: machineh6a
    ports:
      - "10050:3632"
      - "10051:2049"
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

  machineH6B:
    build: ./examples/Series H6/machineH6B
    container_name: machineH6B
    image: machineh6b
    ports:
      - "10052:27017"
      - "10054:22"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Docker.sock for PrivEsc

  machineH6C:
    build: ./examples/Series H6/machineH6C
    container_name: machineH6C
    image: machineh6c
    ports:
      - "10053:443"
      - "10055:22"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  # ============================================================
  # HOUR 7
  # ============================================================
  machineH7A:
    build: ./examples/Series H7/machineH7A
    container_name: machineH7A
    image: machineh7a
    ports:
      - "10060:161/udp"
      - "10061:22"
    restart: unless-stopped

  machineH7B:
    build: ./examples/Series H7/machineH7B
    container_name: machineH7B
    image: machineh7b
    ports:
      - "10062:3000"
    restart: unless-stopped

  machineH7C:
    build: ./examples/Series H7/machineH7C
    container_name: machineH7C
    image: machineh7c
    ports:
      - "10063:873"
    restart: unless-stopped

  # ============================================================
  # HOUR 8
  # ============================================================
  machineH8A:
    build: ./examples/Series H8/machineH8A
    container_name: machineH8A
    image: machineh8a
    ports:
      - "10070:80"
    restart: unless-stopped

  machineH8B:
    build: ./examples/Series H8/machineH8B
    container_name: machineH8B
    image: machineh8b
    ports:
      - "10071:5000"
    restart: unless-stopped

  machineH8C:
    build: ./examples/Series H8/machineH8C
    container_name: machineH8C
    image: machineh8c
    ports:
      - "10072:8000"
    restart: unless-stopped
