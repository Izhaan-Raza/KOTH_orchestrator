# SNMPd config - public community, leaks system/process info
agentaddress udp:161

# Public read community - no auth
rocommunity public 0.0.0.0/0

# Expose system info
sysLocation KoTH Lab
sysContact admin@koth.local
sysName koth-machine

# Enable process MIB (leaks running processes via SNMP walk)
extend processes /bin/ps aux
